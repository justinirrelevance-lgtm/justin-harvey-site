backend:
  name: github
  repo: justinirrelevance-lgtm/justin-harvey-site
  branch: main

media_folder: "assets"
public_folder: "assets"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Actor Profile"
        name: "actor"
        file: "_data/actor.json"
        fields:
          - { label: "Hero Photo", name: "hero_photo", widget: "image" }
          - { label: "Bio (Short)", name: "bio_short", widget: "text" }
          - { label: "Bio (Long)", name: "bio_long", widget: "text" }
          - label: "Physical Stats"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Height", name: "height", widget: "string", default: "185cm / 6'1\"" }
              - { label: "Weight", name: "weight", widget: "string", default: "85kg / 187lbs" }
              - { label: "Languages", name: "languages", widget: "string", default: "English, Korean" }
          - label: "Films & TV"
            name: "credits"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Platform", name: "platform", widget: "string" }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Status", name: "status", widget: "select", options: ["Released", "Upcoming", "In Production"] }
          - label: "Photo Sections (in order)"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Photo", name: "src", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string" }
              - { label: "Badge", name: "badge", widget: "select", options: ["Netflix", "Disney+", "Coupang Play", "Cinema", "None"] }
              - { label: "Horizontal position (%)", name: "pos_x", widget: "number", default: 50, value_type: "int", min: 0, max: 100 }
              - { label: "Vertical position (%)", name: "pos_y", widget: "number", default: 50, value_type: "int", min: 0, max: 100 }
              - { label: "Layout", name: "layout", widget: "select", options: ["full-width", "2-grid-left", "2-grid-right", "3-grid", "split-left", "split-right", "pull-quote"] }

      - label: "Media Kit"
        name: "mediakit"
        file: "_data/mediakit.json"
        fields:
          - label: "Stats"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Instagram Followers", name: "ig_followers", widget: "string", default: "64K" }
              - { label: "Engagement Rate", name: "ig_engagement", widget: "string", default: "48.9%" }
              - { label: "Weekly Reach", name: "weekly_reach", widget: "string", default: "750K" }
              - { label: "YouTube Subscribers", name: "yt_subs", widget: "string", default: "5.5K" }
          - label: "Project Cards (Work That Delivered)"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Project Title", name: "title", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Photo Horizontal %", name: "pos_x", widget: "number", default: 50 }
              - { label: "Photo Vertical %", name: "pos_y", widget: "number", default: 50 }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Brand Partners"
            name: "brands"
            widget: "list"
            fields:
              - { label: "Brand Name", name: "name", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image" }
          - label: "Pricing Packages"
            name: "packages"
            widget: "list"
            fields:
              - { label: "Package Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Deliverables", name: "deliverables", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
