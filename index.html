<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justin Harvey</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sora',sans-serif;overflow:hidden}
@media(max-width:768px){html,body{overflow:auto}}

.wrap{
  height:100vh;
  position:relative;
  display:flex;
  align-items:flex-end;
}

/* FULL BLEED PHOTO */
.bg{
  position:absolute;inset:0;
  background:#111;
}
.bg img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center 18%;
  filter:brightness(0.72);
}

/* GRADIENT OVERLAY — darkens bottom for buttons */
.bg::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    transparent 30%,
    rgba(0,0,0,0.4) 60%,
    rgba(0,0,0,0.85) 100%
  );
}

/* NAME — top left */
.name-tag{
  position:absolute;top:2rem;left:2.5rem;
  z-index:10;
}
.name-tag span{
  font-size:13px;font-weight:600;
  letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(255,255,255,0.7);
}

/* BOTTOM SECTION */
.bottom{
  position:relative;z-index:10;
  width:100%;
  padding:2.5rem 2.5rem 3rem;
}

/* TWO BUTTONS */
.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  max-width:700px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1.5rem 2rem;
  text-decoration:none;
  border-radius:4px;
  cursor:pointer;
  transition:transform 0.15s, box-shadow 0.15s, background 0.15s;
  border:2px solid rgba(255,255,255,0.25);
}
.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
}

.btn-actor{
  background:rgba(255,255,255,0.95);
  border-color:transparent;
}
.btn-actor:hover{background:#ffffff}

.btn-media{
  background:rgba(10,10,10,0.6);
  backdrop-filter:blur(12px);
  border-color:rgba(255,255,255,0.35);
}
.btn-media:hover{background:rgba(10,10,10,0.8)}

.btn-left{}
.btn-label{
  font-size:9px;font-weight:700;
  letter-spacing:0.2em;text-transform:uppercase;
  margin-bottom:6px;
}
.btn-actor .btn-label{color:#7B8FA1}
.btn-media .btn-label{color:rgba(255,255,255,0.5)}

.btn-title{
  font-size:22px;font-weight:700;
  line-height:1.1;letter-spacing:-0.01em;
}
.btn-actor .btn-title{color:#1A1714}
.btn-media .btn-title{color:#ffffff}

.btn-arrow{
  font-size:26px;font-weight:300;
  transition:transform 0.15s;
  flex-shrink:0;margin-left:1rem;
}
.btn-actor .btn-arrow{color:#4A5C6B}
.btn-media .btn-arrow{color:rgba(255,255,255,0.5)}
.btn:hover .btn-arrow{transform:translate(3px,-3px)}

/* SOCIAL LINKS */
.socials{
  display:flex;gap:1.5rem;
  margin-top:1.5rem;
}
.socials a{
  font-size:10px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.4);
  text-decoration:none;transition:color 0.15s;
}
.socials a:hover{color:rgba(255,255,255,0.85)}

.lang{position:absolute;top:2rem;right:2.5rem;z-index:20;display:flex;align-items:center;gap:12px}
.lang a{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);text-decoration:none;transition:color 0.2s}
.lang a.active{color:rgba(255,255,255,0.9);border-bottom:1px solid rgba(255,255,255,0.5);padding-bottom:1px}
.lang a:hover{color:rgba(255,255,255,0.8)}
.lang-div{color:rgba(255,255,255,0.2);font-size:10px}

@media(max-width:768px){
  html,body{overflow:auto}
  .wrap{height:100svh;min-height:600px}
  .buttons{grid-template-columns:1fr;max-width:100%;gap:12px}
  .btn{padding:1.25rem 1.5rem}
  .btn-title{font-size:20px}
  .bottom{padding:2rem 1.5rem 2.5rem}
  .name-tag{top:1.5rem;left:1.5rem}
  .lang{top:1.5rem;right:1.5rem}
}
</style>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

<div class="wrap">

  <!-- FULL BLEED PHOTO -->
  <div class="bg">
    <img src="assets/hero-main.jpg" alt="Justin Harvey">
  </div>

  <!-- NAME TAG -->
  <div class="name-tag">
    <span>Justin Harvey</span>
  </div>

  <!-- LANG TOGGLE -->
  <div class="lang">
    <a href="index.html" class="active">EN</a>
    <span class="lang-div">/</span>
    <a href="ko/index.html">KO</a>
  </div>

  <!-- BOTTOM: BUTTONS + SOCIALS -->
  <div class="bottom">
    <div class="buttons">

      <a href="actor.html" class="btn btn-actor">
        <div class="btn-left">
          <div class="btn-label">Casting & representation</div>
          <div class="btn-title">Actor Profile</div>
        </div>
        <div class="btn-arrow">↗</div>
      </a>

      <a href="mediakit.html" class="btn btn-media">
        <div class="btn-left">
          <div class="btn-label">Brand partnerships</div>
          <div class="btn-title">Media Kit</div>
        </div>
        <div class="btn-arrow">↗</div>
      </a>

    </div>

    <div class="socials">
      <a href="https://www.instagram.com/justin.irrelevance/" target="_blank">Instagram</a>
      <a href="https://www.youtube.com/@Justin.irrelevance" target="_blank">YouTube</a>
      <a href="https://www.imdb.com/name/nm14684840/" target="_blank">IMDb</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

</div>

</body>
</html>
